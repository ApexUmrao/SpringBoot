server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React Router — return index.html for any unknown path
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container
    # (only needed when frontend and backend share the same domain/port)
    location /api/ {
        proxy_pass         http://backend:8081/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy image requests to the backend
    location /images/ {
        proxy_pass http://backend:8081/images/;
    }

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}