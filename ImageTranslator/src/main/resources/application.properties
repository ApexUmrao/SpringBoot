# === REQUIRED: Paste your OpenAI key below ===
# Get it from: https://platform.openai.com/api-keys
spring.config.import=optional:file:.env[.properties]
spring.ai.openai.api-key=${GPT_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o
spring.ai.openai.chat.options.max-tokens=4096

#M7 requires this to auto-register ChatClient bean
spring.ai.chat.client.enabled=true

app.output.directory=Images/TranslatedImages/

# Get free key at: https://aistudio.google.com/app/apikey
#spring.ai.google.api-key=AIzaSyAo7LOMN4O9L8VE78b-5AG_t40Tm2xO3xI
#spring.ai.google.gemini.chat.options.model=gemini-1.5-flash

# Target language: Hindi, French, Spanish, Arabic, Chinese, Japanese, Korean...
app.target-language=Hindi

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
server.port=8080
logging.level.com.example.imagetranslator=DEBUG
